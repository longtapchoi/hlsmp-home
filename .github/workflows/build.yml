name: Build HLSMP-Homes

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with HLSMP
        run: mvn package -B

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: HLSMP-Homes
          path: target/HLSMP-Homes-*.jar
          if-no-files-found: error
