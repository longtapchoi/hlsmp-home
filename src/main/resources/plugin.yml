name: DonutSMP-Homes
version: 1.0.0
main: me.duuchniuk.donutsmphomes.DonutSMPHomesPlugin
api-version: "1.21"
authors: [Duuchniuk]
website: https://modrinth.com/user/Duchniuk
description: Donut SMP styled homes system with colored names, GUI, warmup and movement cancellation.
license: All Rights Reserved
commands:
  sethome:
    description: Save your current location as a home.
    usage: /sethome <nazwa>
    permission: donutsmphomes.sethome
  home:
    description: Open the homes menu or teleport to a saved home.
    usage: /home [nazwa]
    permission: donutsmphomes.home
  delhome:
    description: Delete one of your saved homes.
    usage: /delhome <nazwa>
    permission: donutsmphomes.delhome
permissions:
  donutsmphomes.sethome:
    default: true
  donutsmphomes.home:
    default: true
  donutsmphomes.delhome:
    default: true
